<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tic Tac Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to right, #ff9966, #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .player-score {
            font-size: 1.5rem;
            margin-top: 5px;
        }

        .current-player {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 50px;
            margin: 15px 0;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            margin: 20px 0;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .cell.x {
            color: #ff5e62;
        }

        .cell.o {
            color: #00b4db;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(to right, #00b4db, #0083b0);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        button.reset {
            background: linear-gradient(to right, #ff5e62, #ff9966);
        }

        .game-mode {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        .ai-difficulty {
            display: none;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .ai-difficulty.active {
            display: flex;
        }

        .difficulty-btn {
            padding: 8px 15px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.1);
        }

        .difficulty-btn.active {
            background: rgba(255, 255, 255, 0.3);
            font-weight: bold;
        }

        .winning-cell {
            animation: pulse 1s infinite;
            background: rgba(255, 255, 255, 0.3);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .result-message {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 20px 0;
            min-height: 40px;
        }

        .trophy {
            font-size: 3rem;
            margin: 10px 0;
            display: none;
        }

        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .cell {
                font-size: 2.5rem;
            }
            
            button {
                padding: 10px 20px;
            }
            
            .game-mode, .ai-difficulty {
                flex-direction: column;
                align-items: center;
            }
            
            .mode-btn, .difficulty-btn {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Premium Tic Tac Toe</h1>
        <p class="subtitle">Challenge AI at different difficulty levels</p>
        
        <div class="game-mode">
            <div class="mode-btn active" id="singlePlayer">Single Player</div>
            <div class="mode-btn" id="multiPlayer">Multi Player</div>
        </div>
        
        <div class="ai-difficulty" id="aiDifficulty">
            <div class="difficulty-btn active" data-difficulty="easy">Easy</div>
            <div class="difficulty-btn" data-difficulty="hard">Hard</div>
            <div class="difficulty-btn" data-difficulty="impossible">Impossible</div>
        </div>
        
        <div class="game-info">
            <div class="player-info">
                <div class="player-name">Player X</div>
                <div class="player-score" id="playerXScore">0</div>
            </div>
            <div class="player-info">
                <div class="player-name">Player O</div>
                <div class="player-score" id="playerOScore">0</div>
            </div>
        </div>
        
        <div class="current-player" id="currentPlayer">Player X's Turn</div>
        
        <div class="game-board" id="gameBoard">
            <div class="cell" data-cell-index="0"></div>
            <div class="cell" data-cell-index="1"></div>
            <div class="cell" data-cell-index="2"></div>
            <div class="cell" data-cell-index="3"></div>
            <div class="cell" data-cell-index="4"></div>
            <div class="cell" data-cell-index="5"></div>
            <div class="cell" data-cell-index="6"></div>
            <div class="cell" data-cell-index="7"></div>
            <div class="cell" data-cell-index="8"></div>
        </div>
        
        <div class="result-message" id="resultMessage"></div>
        <div class="trophy" id="trophy">🏆</div>
        
        <div class="controls">
            <button class="reset" id="resetGame">Reset Game</button>
            <button id="newGame">New Game</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Game state variables
            let board = ['', '', '', '', '', '', '', '', ''];
            let currentPlayer = 'X';
            let gameActive = true;
            let singlePlayerMode = true;
            let aiDifficulty = 'easy'; // easy, hard, impossible
            let scores = {
                'X': 0,
                'O': 0
            };
            
            // DOM elements
            const cells = document.querySelectorAll('.cell');
            const currentPlayerElement = document.getElementById('currentPlayer');
            const resultMessageElement = document.getElementById('resultMessage');
            const trophyElement = document.getElementById('trophy');
            const resetButton = document.getElementById('resetGame');
            const newGameButton = document.getElementById('newGame');
            const singlePlayerButton = document.getElementById('singlePlayer');
            const multiPlayerButton = document.getElementById('multiPlayer');
            const aiDifficultyElement = document.getElementById('aiDifficulty');
            const difficultyButtons = document.querySelectorAll('.difficulty-btn');
            const playerXScoreElement = document.getElementById('playerXScore');
            const playerOScoreElement = document.getElementById('playerOScore');
            
            // Winning combinations
            const winningConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
                [0, 4, 8], [2, 4, 6]             // diagonals
            ];
            
            // Initialize game
            initGame();
            
            function initGame() {
                cells.forEach(cell => {
                    cell.addEventListener('click', handleCellClick);
                    cell.classList.remove('x', 'o', 'winning-cell');
                    cell.textContent = '';
                });
                
                resetButton.addEventListener('click', resetGame);
                newGameButton.addEventListener('click', newGame);
                singlePlayerButton.addEventListener('click', () => switchMode(true));
                multiPlayerButton.addEventListener('click', () => switchMode(false));
                
                difficultyButtons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        difficultyButtons.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        aiDifficulty = this.getAttribute('data-difficulty');
                        resetGame();
                    });
                });
                
                updateGameStatus();
            }
            
            function handleCellClick(e) {
                const clickedCell = e.target;
                const cellIndex = parseInt(clickedCell.getAttribute('data-cell-index'));
                
                // Check if cell is already occupied or game is not active
                if (board[cellIndex] !== '' || !gameActive) {
                    return;
                }
                
                // Make player move
                makeMove(cellIndex, currentPlayer);
                
                // Check for win or draw
                if (checkWin()) {
                    endGame(false);
                    return;
                } else if (checkDraw()) {
                    endGame(true);
                    return;
                }
                
                // Switch player
                switchPlayer();
                
                // If single player mode and it's AI's turn
                if (singlePlayerMode && currentPlayer === 'O' && gameActive) {
                    setTimeout(makeAIMove, 600);
                }
            }
            
            function makeMove(cellIndex, player) {
                board[cellIndex] = player;
                const cell = document.querySelector(`[data-cell-index="${cellIndex}"]`);
                cell.textContent = player;
                cell.classList.add(player.toLowerCase());
            }
            
            function switchPlayer() {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                updateGameStatus();
            }
            
            function updateGameStatus() {
                currentPlayerElement.textContent = `Player ${currentPlayer}'s Turn`;
                currentPlayerElement.style.background = currentPlayer === 'X' 
                    ? 'rgba(255, 94, 98, 0.7)' 
                    : 'rgba(0, 180, 219, 0.7)';
            }
            
            function checkWin() {
                for (let i = 0; i < winningConditions.length; i++) {
                    const [a, b, c] = winningConditions[i];
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        // Highlight winning cells
                        document.querySelector(`[data-cell-index="${a}"]`).classList.add('winning-cell');
                        document.querySelector(`[data-cell-index="${b}"]`).classList.add('winning-cell');
                        document.querySelector(`[data-cell-index="${c}"]`).classList.add('winning-cell');
                        return true;
                    }
                }
                return false;
            }
            
            function checkDraw() {
                return board.every(cell => cell !== '');
            }
            
            function endGame(isDraw) {
                gameActive = false;
                
                if (isDraw) {
                    resultMessageElement.textContent = "Game ended in a draw!";
                    resultMessageElement.style.color = "#ffcc00";
                } else {
                    const winner = currentPlayer === 'X' ? 'O' : 'X'; // Switch back to actual winner
                    resultMessageElement.textContent = `Player ${winner} wins!`;
                    resultMessageElement.style.color = winner === 'X' ? '#ff5e62' : '#00b4db';
                    
                    // Update score
                    scores[winner]++;
                    updateScoreDisplay();
                    
                    // Show trophy
                    trophyElement.style.display = 'block';
                }
            }
            
            function updateScoreDisplay() {
                playerXScoreElement.textContent = scores['X'];
                playerOScoreElement.textContent = scores['O'];
            }
            
            function makeAIMove() {
                if (!gameActive) return;
                
                let move;
                
                switch(aiDifficulty) {
                    case 'easy':
                        move = makeEasyMove();
                        break;
                    case 'hard':
                        move = makeHardMove();
                        break;
                    case 'impossible':
                        move = makeImpossibleMove();
                        break;
                    default:
                        move = makeEasyMove();
                }
                
                if (move !== -1) {
                    makeMove(move, 'O');
                    
                    if (checkWin()) {
                        endGame(false);
                        return;
                    } else if (checkDraw()) {
                        endGame(true);
                        return;
                    }
                    
                    switchPlayer();
                }
            }
            
            function makeEasyMove() {
                // Easy AI - makes random moves
                const availableMoves = board
                    .map((cell, index) => cell === '' ? index : -1)
                    .filter(index => index !== -1);
                
                if (availableMoves.length === 0) return -1;
                
                return availableMoves[Math.floor(Math.random() * availableMoves.length)];
            }
            
            function makeHardMove() {
                // Hard AI - tries to win or block, otherwise makes strategic moves
                
                // 1. Try to win
                for (let i = 0; i < winningConditions.length; i++) {
                    const [a, b, c] = winningConditions[i];
                    const cells = [board[a], board[b], board[c]];
                    
                    if (cells.filter(cell => cell === 'O').length === 2) {
                        const emptyIndex = [a, b, c].find(index => board[index] === '');
                        if (emptyIndex !== undefined) {
                            return emptyIndex;
                        }
                    }
                }
                
                // 2. Try to block player
                for (let i = 0; i < winningConditions.length; i++) {
                    const [a, b, c] = winningConditions[i];
                    const cells = [board[a], board[b], board[c]];
                    
                    if (cells.filter(cell => cell === 'X').length === 2) {
                        const emptyIndex = [a, b, c].find(index => board[index] === '');
                        if (emptyIndex !== undefined) {
                            return emptyIndex;
                        }
                    }
                }
                
                // 3. Take center if available
                if (board[4] === '') return 4;
                
                // 4. Take corners if available
                const corners = [0, 2, 6, 8].filter(index => board[index] === '');
                if (corners.length > 0) {
                    return corners[Math.floor(Math.random() * corners.length)];
                }
                
                // 5. Otherwise random
                return makeEasyMove();
            }
            
            function makeImpossibleMove() {
                // Impossible AI - uses minimax algorithm for perfect play
                return minimax(board, 'O').index;
            }
            
            function minimax(newBoard, player) {
                // Available moves
                const availableMoves = newBoard
                    .map((cell, index) => cell === '' ? index : -1)
                    .filter(index => index !== -1);
                
                // Check for terminal states
                if (checkWinForMinimax(newBoard, 'X')) {
                    return { score: -10 };
                } else if (checkWinForMinimax(newBoard, 'O')) {
                    return { score: 10 };
                } else if (availableMoves.length === 0) {
                    return { score: 0 };
                }
                
                // Array to collect all the moves and their scores
                const moves = [];
                
                // Loop through available moves
                for (let i = 0; i < availableMoves.length; i++) {
                    const move = {};
                    move.index = availableMoves[i];
                    
                    // Make the move
                    newBoard[availableMoves[i]] = player;
                    
                    // Collect the score from the recursive call
                    if (player === 'O') {
                        const result = minimax(newBoard, 'X');
                        move.score = result.score;
                    } else {
                        const result = minimax(newBoard, 'O');
                        move.score = result.score;
                    }
                    
                    // Undo the move
                    newBoard[availableMoves[i]] = '';
                    
                    // Push the move to the array
                    moves.push(move);
                }
                
                // Choose the best move
                let bestMove;
                if (player === 'O') {
                    let bestScore = -Infinity;
                    for (let i = 0; i < moves.length; i++) {
                        if (moves[i].score > bestScore) {
                            bestScore = moves[i].score;
                            bestMove = i;
                        }
                    }
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < moves.length; i++) {
                        if (moves[i].score < bestScore) {
                            bestScore = moves[i].score;
                            bestMove = i;
                        }
                    }
                }
                
                // Return the best move
                return moves[bestMove];
            }
            
            function checkWinForMinimax(board, player) {
                for (let i = 0; i < winningConditions.length; i++) {
                    const [a, b, c] = winningConditions[i];
                    if (board[a] === player && board[b] === player && board[c] === player) {
                        return true;
                    }
                }
                return false;
            }
            
            function resetGame() {
                board = ['', '', '', '', '', '', '', '', ''];
                gameActive = true;
                currentPlayer = 'X';
                
                cells.forEach(cell => {
                    cell.textContent = '';
                    cell.classList.remove('x', 'o', 'winning-cell');
                });
                
                resultMessageElement.textContent = '';
                trophyElement.style.display = 'none';
                
                updateGameStatus();
                
                // If single player and AI goes first
                if (singlePlayerMode && currentPlayer === 'O') {
                    setTimeout(makeAIMove, 600);
                }
            }
            
            function newGame() {
                scores = { 'X': 0, 'O': 0 };
                updateScoreDisplay();
                resetGame();
            }
            
            function switchMode(isSinglePlayer) {
                singlePlayerMode = isSinglePlayer;
                
                if (isSinglePlayer) {
                    singlePlayerButton.classList.add('active');
                    multiPlayerButton.classList.remove('active');
                    aiDifficultyElement.classList.add('active');
                } else {
                    singlePlayerButton.classList.remove('active');
                    multiPlayerButton.classList.add('active');
                    aiDifficultyElement.classList.remove('active');
                }
                
                resetGame();
            }
        });
    </script>
</body>
</html>
